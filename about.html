<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About - Project Exodus</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
</head>
<body>
  <script src="background.js"></script>

  <div id="site-header"></div>

  <section class="about">
    <h2>About Us</h2>
    <p>Project Exodus is a faith-driven clothing brand. Every piece we make carries purpose — a reminder that you are not defined by where you've been, but by where you're going. Browse our collection and walk in your calling.</p>
  </section>

  <footer>
    <p>Follow us on:</p>
    <ul>
      <li><a href="#">Facebook</a></li>
      <li><a href="#">Instagram</a></li>
      <li><a href="#">Twitter</a></li>
    </ul>
  </footer>

  <script>
    fetch('header.html')
      .then(res => res.text())
      .then(data => {
        document.getElementById('site-header').innerHTML = data;
      });
  </script>
  <script src="script.js"></script>
</body>
</html>
